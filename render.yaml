    name: relationshipos-api
    runtime: docker
    region: singapore                 # Close to Neon DB in ap-southeast-2 (Sydney)
    plan: free                       # Free tier — 750 hrs/month
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_HvYka2b5nPOZ@ep-autumn-sound-a7om89h2-pooler.ap-southeast-2.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET_KEY
        value: relateos-secret-key-2024-production
      - key: SECRET_KEY
        value: relateos-secret-key-2024-production
      - key: CORS_ORIGINS
        value: "*"
      - key: APP_NAME
        value: RelationshipOS
      - key: APP_VERSION
        value: "1.0.0"
      - key: PORT
        value: "10000"               # Render free tier uses port 10000
