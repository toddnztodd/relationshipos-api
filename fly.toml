# ─────────────────────────────────────────────────────────────
# Fly.io Configuration — RelationshipOS Backend
# ─────────────────────────────────────────────────────────────
# Deploy:
#   1. Install flyctl: curl -L https://fly.io/install.sh | sh
#   2. fly auth login
#   3. fly launch --copy-config --no-deploy   (creates the app)
#   4. fly secrets set JWT_SECRET_KEY=$(openssl rand -hex 32)
#   5. fly deploy
# ─────────────────────────────────────────────────────────────

app = "relationshipos-api"
primary_region = "syd"              # Sydney — closest to NZ

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite+aiosqlite:///./data/relationshipos.db"
  CORS_ORIGINS = "*"
  APP_NAME = "RelationshipOS"
  APP_VERSION = "1.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"       # Stops when idle (free tier friendly)
  auto_start_machines = true        # Restarts on incoming request
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
